server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /health {
        proxy_pass http://api:8080;
    }

    location /metrics {
        proxy_pass http://api:8080;
    }

    location /scalar/ {
        proxy_pass http://api:8080;
    }

    location /openapi/ {
        proxy_pass http://api:8080;
    }

    location / {
        try_files $uri /index.html;
    }
}
